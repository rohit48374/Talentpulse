server:
  port: ${PORT:8000}
  servlet:
    context-path: /

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:sqlite:db.sqlite3}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER:org.sqlite.JDBC}
    username: ${DB_USER:}
    password: ${DB_PASSWORD:}
  jpa:
    database-platform: ${SPRING_JPA_PLATFORM:org.hibernate.community.dialect.SQLiteDialect}
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: ${SPRING_JPA_PLATFORM:org.hibernate.community.dialect.SQLiteDialect}
        format_sql: true
    show-sql: false
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  mail:
    host: ${EMAIL_HOST:smtp.gmail.com}
    port: ${EMAIL_PORT:587}
    username: ${EMAIL_HOST_USER:}
    password: ${EMAIL_HOST_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

# Custom application configuration properties
app:
  jwt:
    secret: ${JWT_SECRET_KEY:default-very-long-secret-key-that-satisfies-hmac-sha-requirements-32-bytes-minimum}
    expiration-hours: ${JWT_EXPIRATION_HOURS:24}
  upload:
    dir: ${UPLOAD_DIR:media}
  candidate-portal-url: ${CANDIDATE_PORTAL_URL:http://localhost:5173}
  frontend-url: ${FRONTEND_URL:http://localhost:3000}

joinfaces:
  primefaces:
    theme: vela
